<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Askım Sürpriz Kutusu 💖</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: white;
    text-align: center;
    padding: 30px;
}

.container {
    max-width: 420px;
    margin: auto;
}

h1 {
    color: #ff4da6;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

button {
    background: #ff4da6;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}

.card {
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    animation: pop 0.4s ease;
}

@keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="container">

<h1>💖 Askım Sürpriz Kutusu</h1>

<input type="date" id="date">
<button onclick="openSurprise()">Sürprizi Aç 🎁</button>

"Çocukluk anısı paylaşın 👶",

"Korkularınızı paylaşın 🫶",
"Hayali tatil planlayın ✈️",
"Aynı anda aynı cümleyi söylemeye çalışın 😂",
"1 dakika göz göze bakın 👀",
"Seni seviyorum çünkü oyunu oynayın 💕",

"Gece yürüyüşünde konuşun 🌙",

const messages = [
"Bugün sadece sana ait 💖",
"Birlikte olmak bile yeter ✨",
"Seninle her şey daha güzel 💕",
"Bugün küçük bir an, ama büyük bir his 💫",
"İyi ki varsın 🫶"
];

function openSurprise() {
    const date = document.getElementById("date").value;

    if (!date) {
        alert("Bir tarih seç 💖");
        return;
    }

    const d = new Date(date);

    const taskIndex = (d.getDate() + d.getMonth()) % tasks.length;
    const msgIndex = Math.floor(Math.random() * messages.length);

    const result = document.getElementById("result");

    result.innerHTML = `
        <div class="card">
            <h2>💖 Bugünün Birlikte Görevi</h2>
            <p style="font-size:18px">${tasks[taskIndex]}</p>
            <hr style="opacity:0.2">
            <p style="opacity:0.8">${messages[msgIndex]}</p>
        </div>
    `;
}

</script>

</body>
</html>
